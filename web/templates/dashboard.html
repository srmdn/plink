{{define "dashboard"}}
<!DOCTYPE html>
<html lang="en">
{{template "head" .}}
<body>
<div id="app">

  <header>
    <div class="logo">plink <span>/ admin</span></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <a href="/" class="btn btn-ghost btn-sm">home</a>
      <form method="POST" action="/{{.AdminPath}}/logout" style="display:inline">
        <button type="submit" class="btn btn-ghost btn-sm">logout</button>
      </form>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="toolbar-left">
        <input
          type="text"
          id="search"
          name="q"
          value="{{.Query}}"
          placeholder="search links..."
          autocomplete="off"
          spellcheck="false"
          hx-get="/{{.AdminPath}}/links"
          hx-trigger="input changed delay:200ms"
          hx-target="#links-section"
          hx-swap="innerHTML"
          hx-include="#search, select[name='category']"
        />
        <span class="count" id="link-count">
          {{if or .Query .Category}}{{.Count}} of {{.Total}}{{else}}{{.Total}} link{{if ne .Total 1}}s{{end}}{{end}}
        </span>
      </div>
      <div class="export-wrap">
        <button class="btn btn-ghost btn-sm" onclick="toggleExportMenu(event)">export ↓</button>
        <div class="export-menu hidden" id="export-menu">
          <a href="/api/export?format=json">JSON</a>
          <a href="/api/export?format=csv">CSV</a>
        </div>
      </div>
      <button
        class="btn btn-primary"
        hx-get="/{{.AdminPath}}/links/new"
        hx-target="#modal-body"
        hx-swap="innerHTML"
      >+ add link</button>
    </div>

    <!-- Link modal -->
    <div class="overlay hidden" id="link-modal" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div id="modal-body"></div>
      </div>
    </div>

    <!-- Analytics modal -->
    <div class="overlay hidden" id="analytics-modal" onclick="if(event.target===this)closeAnalyticsModal()">
      <div class="modal analytics-modal">
        <div class="modal-header">
          <span class="modal-title" id="analytics-title">analytics</span>
          <button class="btn btn-ghost btn-sm" onclick="closeAnalyticsModal()">✕</button>
        </div>
        <div id="analytics-body"></div>
      </div>
    </div>

    <div id="links-section">
      {{template "links-section" .}}
    </div>
  </main>

</div>
</body>
</html>
{{end}}
